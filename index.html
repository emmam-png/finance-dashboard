<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Household Finance Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Excel Reader -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>


<body>


<div class="container">


<header>

<h1>💰 Household Finance Dashboard</h1>

<p>Savings, ISA and budget tracker</p>


<input 
type="file" 
id="excelFile" 
accept=".xlsx,.xls">


</header>



<section class="cards">


<div class="card">

<h3>Total Savings</h3>

<h2 id="savings">
£0
</h2>

</div>



<div class="card">

<h3>Accounts</h3>

<h2 id="accountCount">
0
</h2>

</div>



<div class="card">

<h3>Owners</h3>

<h2 id="ownerCount">
0
</h2>

</div>



<div class="card">

<h3>Last Updated</h3>

<h2 id="updated">
-
</h2>

</div>


</section>





<section class="panel">


<h2>Savings Accounts</h2>


<table id="accountsTable">


<tr>

<th>Who</th>

<th>Account</th>

<th>Type</th>

<th>Value</th>

</tr>


</table>


</section>





<section class="panel">


<h2>Growth Overview</h2>


<canvas id="savingsChart"></canvas>


</section>





<section class="panel">


<h2>AI Assistant</h2>


<div class="chatbox">


<p>
Ask questions about your finances:
</p>


<input 
type="text"
placeholder="How much savings do we have?">


<button>
Ask
</button>


</div>


</section>



</div>




<script src="app.js"></script>


</body>

</html>
